name: Linux Build

on:
  push:
    branches: [main, master]
  # Note: We don't run on pull_request because:
  # 1. The Apple workflow already validates the build on PR
  # 2. This avoids duplicate runs when PRs are merged
  # 3. Linux build runs after merge to verify main branch health

concurrency:
  group: linux-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container: swift:6.2-noble
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y libssl-dev zlib1g-dev
      
      - name: Build library (ApplePackage)
        run: swift build --target ApplePackage 2>&1
      
      - name: Build CLI tool (ApplePackageTool)
        run: swift build --target ApplePackageTool 2>&1
      
      - name: Run tests
        run: swift test 2>&1
